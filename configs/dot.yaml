name: "dot 安装器"
version: "1.0"
description: "选择要安装/配置的工具"
menuMode: "single"

output:
  filename: "dot.sh"
  dir: "dist"

menu:
  - id: "tmux"
    label: "Tmux 一键配置"
    description: "安装方式、前缀键、插件、状态栏、基础选项"
    mode: "flow"
    children:
      # ── 安装方式 ──
      - id: "tmux-install"
        label: "安装方式"
        mode: "single"
        description: "选择 Tmux 安装方式"
        children:
          - id: "tmux-install-apt"
            label: "包管理器安装 (apt)"
            description: "简单快速，版本可能不是最新"
            script: "../templates/tmux/install-apt.sh"
          - id: "tmux-install-source"
            label: "源码编译安装"
            description: "获取最新版本，需要编译环境"
            script: "../templates/tmux/install-source.sh"
            vars:
              tmux_version: "3.4"
          - id: "tmux-install-recommended"
            label: "安装推荐tmux安装配置"
            description: "使用旧 Tmux.sh 的完整推荐配置：Ctrl+Space、Catppuccin 状态栏、常用插件和 Vi 模式"
            script: "../templates/tmux/install-recommended.sh"
            deps: ["tmux-install-apt", "tmux-github-mirror", "tmux-tpm", "tmux-font-jetbrainsmono"]
            post: true
            endFlow: true

      # ── GitHub 加速源 ──
      - id: "tmux-github-mirror"
        label: "GitHub 加速源"
        description: "测速并选择 GitHub 下载源，供 TPM、源码和字体下载复用"
        script: "../templates/tmux/github-mirror-select.sh"

      # ── 前缀键 ──
      - id: "tmux-prefix"
        label: "前缀键"
        mode: "single"
        description: "选择 Tmux 命令前缀键"
        children:
          - id: "tmux-prefix-ctrl-a"
            label: "Ctrl+A (screen 风格)"
            description: "从 screen 迁移的用户推荐"
            script: "../templates/tmux/prefix-ctrl-a.sh"
            deps: ["tmux-header"]
          - id: "tmux-prefix-ctrl-b"
            label: "Ctrl+B (默认)"
            description: "Tmux 默认前缀键"
            script: "../templates/tmux/prefix-ctrl-b.sh"
            deps: ["tmux-header"]
          - id: "tmux-prefix-record"
            label: "录制自定义前缀键"
            description: "直接按下组合键进行录制"
            script: "../templates/tmux/prefix-custom.sh"
            deps: ["tmux-header"]
            vars:
              custom_prefix: "C-x"
            prompt:
              type: "key"
              var: "custom_prefix"
              label: "请直接按下你想要的 Tmux 前缀组合键"
          - id: "tmux-prefix-compose"
            label: "选择自定义前缀键"
            description: "先选择特殊键，再选择普通按键"
            script: "../templates/tmux/prefix-custom.sh"
            deps: ["tmux-header"]
            vars:
              custom_prefix: "C-x"
            prompt:
              type: "key-compose"
              var: "custom_prefix"
              label: "手动组合 Tmux 前缀键"

      # ── 插件管理 ──
      - id: "tmux-plugins"
        label: "插件管理"
        mode: "flow"
        description: "按用途分组选择 TPM 插件：会话恢复、剪贴板、状态栏、主题、导航与侧边栏"
        children:
          - id: "tmux-plugin-foundation"
            label: "插件基础设施"
            mode: "multi"
            description: "TPM 插件管理器与最终初始化步骤；选择插件时至少需要 TPM，初始化应放在最后"
            children:
              - id: "tmux-tpm"
                label: "安装 TPM 插件管理器"
                description: "Tmux Plugin Manager，安装和管理其他 tmux 插件的基础"
                script: "../templates/tmux/tpm-install.sh"
                deps: ["tmux-header"]
              - id: "tmux-tpm-finalize"
                label: "TPM 初始化"
                description: "加载 TPM 引擎并安装已声明插件；post 节点，自动在插件声明之后执行"
                script: "../templates/tmux/tpm-finalize.sh"
                deps: ["tmux-tpm"]
                post: true
          - id: "tmux-plugin-session"
            label: "会话保存与恢复"
            mode: "multi"
            description: "适合长期工作区：保存窗格、窗口和会话状态，并可定期自动备份"
            children:
              - id: "tmux-plugin-resurrect"
                label: "resurrect (会话保存恢复)"
                description: "手动保存并恢复 tmux 会话、窗格内容和 shell 历史，适合重启后恢复工作区"
                script: "../templates/tmux/plugin-resurrect.sh"
                deps: ["tmux-tpm"]
              - id: "tmux-plugin-continuum"
                label: "continuum (自动保存)"
                description: "在 resurrect 基础上定期自动保存会话，并可在 tmux 启动时自动恢复"
                script: "../templates/tmux/plugin-continuum.sh"
                deps: ["tmux-tpm", "tmux-plugin-resurrect"]
          - id: "tmux-plugin-productivity"
            label: "复制、打开与默认体验"
            mode: "multi"
            description: "提升日常操作效率：剪贴板同步、快速打开路径，以及更合理的默认按键体验"
            children:
              - id: "tmux-plugin-yank"
                label: "yank (系统剪贴板)"
                description: "将复制模式或鼠标选中的内容同步到系统剪贴板，适合频繁跨应用复制"
                script: "../templates/tmux/plugin-yank.sh"
                deps: ["tmux-tpm"]
              - id: "tmux-plugin-open"
                label: "open (快速打开)"
                description: "在 tmux 中快速打开文件、路径或 URL，减少复制路径后手动打开的步骤"
                script: "../templates/tmux/plugin-open.sh"
                deps: ["tmux-tpm"]
              - id: "tmux-plugin-sensible"
                label: "sensible (合理默认)"
                description: "提供一组社区认可的 tmux 默认配置，适合希望快速获得舒适基础体验的用户"
                script: "../templates/tmux/plugin-sensible.sh"
                deps: ["tmux-tpm"]
          - id: "tmux-plugin-status"
            label: "状态栏信息增强"
            mode: "multi"
            description: "在状态栏展示前缀键、CPU、内存和电池信息，适合重视运行状态可视化的环境"
            children:
              - id: "tmux-plugin-prefix-highlight"
                label: "prefix-highlight (前缀键状态)"
                description: "在状态栏显示前缀键是否处于激活状态，帮助确认下一次按键是否会被 tmux 捕获"
                script: "../templates/tmux/plugin-prefix-highlight.sh"
                deps: ["tmux-tpm"]
              - id: "tmux-plugin-cpu"
                label: "cpu (CPU/内存状态)"
                description: "在状态栏显示 CPU 与内存使用情况，适合需要持续观察系统负载的终端工作流"
                script: "../templates/tmux/plugin-cpu.sh"
                deps: ["tmux-tpm"]
              - id: "tmux-plugin-battery"
                label: "battery (电池状态)"
                description: "在状态栏显示电池电量与充电状态，适合笔记本、移动工作站或远程终端环境"
                script: "../templates/tmux/plugin-battery.sh"
                deps: ["tmux-tpm"]
          - id: "tmux-plugin-themes"
            label: "主题外观（二选一推荐）"
            mode: "multi"
            description: "主题插件会同时改写状态栏样式；Catppuccin 与 Dracula 建议只选择一个，避免配置互相覆盖"
            children:
              - id: "tmux-plugin-catppuccin"
                label: "catppuccin/tmux (柔和主题)"
                description: "Catppuccin pastel 配色主题；选择后会提示安装 JetBrainsMono Nerd Font 以正确显示状态栏图标"
                script: "../templates/tmux/plugin-catppuccin.sh"
                deps: ["tmux-tpm", "tmux-font-jetbrainsmono"]
              - id: "tmux-plugin-dracula"
                label: "dracula/tmux (高对比主题)"
                description: "Dracula 深色高对比主题；如果也选择 Catppuccin，两个主题的状态栏设置可能互相覆盖"
                script: "../templates/tmux/plugin-dracula.sh"
                deps: ["tmux-tpm"]
          - id: "tmux-plugin-navigation"
            label: "导航与侧边栏"
            mode: "multi"
            description: "增强窗格与项目文件导航，适合 Vim/Neovim 用户和常在 tmux 中浏览项目的工作流"
            children:
              - id: "tmux-plugin-sidebar"
                label: "sidebar (文件树侧边栏)"
                description: "在 tmux 侧边栏中显示项目文件树，便于快速浏览和打开目录结构"
                script: "../templates/tmux/plugin-sidebar.sh"
                deps: ["tmux-tpm"]
              - id: "tmux-plugin-vim-navigator"
                label: "vim-tmux-navigator (Vim/Neovim 窗格导航)"
                description: "在 Vim/Neovim 与 tmux 窗格之间使用一致快捷键无缝移动，减少编辑器和终端切换成本"
                script: "../templates/tmux/plugin-vim-tmux-navigator.sh"
                deps: ["tmux-tpm"]

      # ── 状态栏 ──
      - id: "tmux-status"
        label: "状态栏风格"
        mode: "single"
        description: "选择底部状态栏样式"
        children:
          - id: "tmux-status-minimal"
            label: "简洁风格"
            description: "只显示会话名、窗口和时间"
            script: "../templates/tmux/status-minimal.sh"
            deps: ["tmux-header"]
          - id: "tmux-status-rich"
            label: "信息丰富"
            description: "显示 CPU、内存、详细时间"
            script: "../templates/tmux/status-rich.sh"
            deps: ["tmux-header"]

      # ── 基础配置 ──
      - id: "tmux-options"
        label: "基础配置"
        mode: "multi"
        description: "常用基础选项"
        children:
          - id: "tmux-opt-mouse"
            label: "鼠标支持"
            description: "支持鼠标点击切换面板、调整大小"
            script: "../templates/tmux/opt-mouse.sh"
            deps: ["tmux-header"]
          - id: "tmux-opt-vi"
            label: "Vi 模式"
            description: "复制模式使用 vi 键位"
            script: "../templates/tmux/opt-vi-mode.sh"
            deps: ["tmux-header"]
          - id: "tmux-opt-index"
            label: "窗口索引从 1 开始"
            description: "默认从 0 开始，改为 1 更直觉"
            script: "../templates/tmux/opt-index-1.sh"
            deps: ["tmux-header"]
          - id: "tmux-opt-split"
            label: "直觉化分割快捷键"
            description: "| 水平分割，- 垂直分割，Alt+方向键切换"
            script: "../templates/tmux/opt-split.sh"
            deps: ["tmux-header"]
          - id: "tmux-opt-reload"
            label: "快速重载配置"
            description: "prefix+r 重新加载 tmux.conf"
            script: "../templates/tmux/opt-reload.sh"
            deps: ["tmux-header"]

      # ── 收尾 ──
      - id: "tmux-finalize"
        label: "收尾与提示"
        mode: "multi"
        description: "清理旧 tmux socket，并显示字体、插件与启动 tmux 的后续提示"
        children:
          - id: "tmux-cleanup-sockets"
            label: "清理旧 tmux socket"
            description: "退出 tmux 外运行时清理旧 socket，避免新旧 tmux 二进制混用"
            script: "../templates/tmux/cleanup-sockets.sh"
            post: true
          - id: "tmux-final-notes"
            label: "显示最终提示"
            description: "提醒设置 Nerd Font、启动 tmux 与手动刷新 TPM 插件"
            script: "../templates/tmux/final-notes.sh"
            post: true

      # ── 配置初始化（内部节点，自动依赖） ──
      - id: "tmux-font-jetbrainsmono"
        label: "安装 JetBrainsMono Nerd Font"
        hidden: true
        description: "Catppuccin 状态栏图标字体，选择 catppuccin/tmux 后自动提示安装"
        script: "../templates/tmux/font-jetbrainsmono.sh"

      - id: "tmux-header"
        label: "配置文件初始化"
        hidden: true
        description: "初始化 tmux.conf（自动选中）"
        script: "../templates/tmux/header.sh"

  - id: "zsh"
    label: "Zsh 一键配置"
    description: "检查、安装、配置、恢复或卸载 Zsh、Oh My Zsh、Powerlevel10k 和常用插件"
    mode: "flow"
    children:
      # ── 环境检查 ──
      - id: "zsh-diagnose"
        label: "检查当前 Zsh 环境"
        description: "检查 zsh、依赖命令、Oh My Zsh、主题、插件、zshrc 和默认 shell 状态"
        script: "../templates/zsh/diagnose.sh"

      # ── 安装方式 ──
      - id: "zsh-install"
        label: "安装方式"
        mode: "single"
        description: "安装 zsh 与后续配置所需的 git、curl 等基础依赖"
        children:
          - id: "zsh-install-apt"
            label: "包管理器安装 (apt)"
            description: "安装 zsh、git、curl、ca-certificates"
            script: "../templates/zsh/install-apt.sh"
          - id: "zsh-install-skip"
            label: "跳过安装，系统已安装 zsh"
            description: "检查 zsh、git、curl 是否可用，不执行 apt"
            script: "../templates/zsh/install-skip.sh"

      # ── 卸载与恢复 ──
      - id: "zsh-recovery"
        label: "Zsh 卸载与恢复"
        description: "检查 Zsh 状态，恢复 zshrc/default shell，或把 Oh My Zsh、主题和插件移动到备份目录"
        mode: "multi"
        children:
          - id: "zsh-recovery-diagnose"
            label: "检查当前 Zsh 环境"
            description: "检查 zsh、依赖命令、Oh My Zsh、主题、插件、zshrc 和默认 shell 状态"
            script: "../templates/zsh/diagnose.sh"
          - id: "zsh-zshrc-restore-backup"
            label: "恢复最近的 zshrc 备份"
            description: "从 ~/.zshrc.bak.* 或 ~/.dot-backups/zsh/ 中恢复最新备份"
            script: "../templates/zsh/zshrc-restore-backup.sh"
          - id: "zsh-chsh-reset-bash"
            label: "恢复默认 shell 为 bash"
            description: "将登录 shell 改回 bash，适合卸载或恢复场景"
            script: "../templates/zsh/chsh-reset-bash.sh"
          - id: "zsh-uninstall-plugins"
            label: "卸载托管插件"
            description: "把 zsh-autosuggestions、zsh-syntax-highlighting 移动到备份目录"
            script: "../templates/zsh/uninstall-plugins.sh"
          - id: "zsh-uninstall-powerlevel10k"
            label: "卸载 Powerlevel10k"
            description: "把 Powerlevel10k 主题目录移动到备份目录"
            script: "../templates/zsh/uninstall-powerlevel10k.sh"
          - id: "zsh-uninstall-oh-my-zsh"
            label: "卸载 Oh My Zsh"
            description: "把 ~/.oh-my-zsh 移动到备份目录，不直接删除用户数据"
            script: "../templates/zsh/uninstall-oh-my-zsh.sh"
          - id: "zsh-uninstall-apt-remove"
            label: "移除 zsh 软件包（谨慎）"
            description: "使用 apt remove zsh；运行前应先把默认 shell 改回 bash"
            script: "../templates/zsh/uninstall-apt-remove.sh"
          - id: "zsh-recovery-final-notes"
            label: "显示最终提示"
            description: "提示重新打开终端确认默认 shell、zshrc 和 Oh My Zsh 状态"
            script: "../templates/zsh/final-notes.sh"
            post: true

      # ── Oh My Zsh ──
      - id: "zsh-oh-my-zsh"
        label: "Oh My Zsh"
        mode: "single"
        description: "安装 Oh My Zsh，或保留现有配置并跳过"
        children:
          - id: "zsh-oh-my-zsh-install"
            label: "安装 Oh My Zsh"
            description: "使用官方 installer 的非交互模式，不自动切换 shell 或修改默认 shell"
            script: "../templates/zsh/oh-my-zsh-install.sh"
          - id: "zsh-oh-my-zsh-skip"
            label: "跳过 Oh My Zsh"
            description: "不安装 Oh My Zsh，只检查当前目录状态"
            script: "../templates/zsh/oh-my-zsh-skip.sh"

      # ── Powerlevel10k ──
      - id: "zsh-powerlevel10k"
        label: "主题"
        mode: "single"
        description: "选择 Powerlevel10k 下载源，或跳过主题安装"
        children:
          - id: "zsh-powerlevel10k-github"
            label: "Powerlevel10k GitHub 源"
            description: "使用 romkatv/powerlevel10k 官方 GitHub 仓库"
            script: "../templates/zsh/powerlevel10k-github.sh"
          - id: "zsh-powerlevel10k-gitee"
            label: "Powerlevel10k Gitee 源"
            description: "使用 romkatv/powerlevel10k Gitee 镜像"
            script: "../templates/zsh/powerlevel10k-gitee.sh"
          - id: "zsh-powerlevel10k-skip"
            label: "跳过主题安装"
            description: "保留当前 ZSH_THEME，不安装 Powerlevel10k"
            script: "../templates/zsh/powerlevel10k-skip.sh"

      # ── 插件 ──
      - id: "zsh-plugins"
        label: "常用插件"
        mode: "multi"
        description: "按需安装插件；zshrc 写入时会让语法高亮保持在 plugins 列表最后"
        children:
          - id: "zsh-plugin-autosuggestions"
            label: "zsh-autosuggestions"
            description: "根据历史命令提供灰色补全建议"
            script: "../templates/zsh/plugin-autosuggestions.sh"
          - id: "zsh-plugin-syntax-highlighting"
            label: "zsh-syntax-highlighting"
            description: "命令输入时即时语法高亮，必须最后加载"
            script: "../templates/zsh/plugin-syntax-highlighting.sh"

      # ── zshrc 配置 ──
      - id: "zsh-zshrc"
        label: "zshrc 配置"
        mode: "single"
        description: "选择完整推荐配置、最小配置、只更新主题/插件、恢复备份或跳过"
        children:
          - id: "zsh-zshrc-recommended"
            label: "写入推荐 zshrc"
            description: "配置 Oh My Zsh、Powerlevel10k 主题和所选插件；不会在 bash 中 source zshrc"
            script: "../templates/zsh/zshrc-recommended.sh"
          - id: "zsh-zshrc-minimal"
            label: "写入最小 zshrc"
            description: "只确保 Oh My Zsh 基础 source 和 git 插件，不启用 Powerlevel10k"
            script: "../templates/zsh/zshrc-minimal.sh"
          - id: "zsh-zshrc-patch-only"
            label: "只更新主题和插件"
            description: "保留现有 zshrc 结构，只更新 ZSH_THEME 和 plugins 行"
            script: "../templates/zsh/zshrc-patch-only.sh"
          - id: "zsh-zshrc-skip"
            label: "跳过 zshrc 修改"
            description: "不修改 ~/.zshrc，只显示后续手动配置提示"
            script: "../templates/zsh/zshrc-skip.sh"

      # ── 默认 shell ──
      - id: "zsh-default-shell"
        label: "默认终端"
        mode: "single"
        description: "是否将登录 shell 修改为 zsh；生效通常需要重新登录"
        children:
          - id: "zsh-chsh-default"
            label: "修改默认 shell 为 zsh"
            description: "执行 chsh -s $(which zsh)，可能需要输入密码"
            script: "../templates/zsh/chsh-default.sh"
          - id: "zsh-chsh-skip"
            label: "暂不修改默认 shell"
            description: "保留当前默认 shell，只显示后续手动进入 zsh 的提示"
            script: "../templates/zsh/chsh-skip.sh"

      # ── 收尾提示 ──
      - id: "zsh-final-notes"
        label: "显示最终提示"
        description: "提示手动进入 zsh、source zshrc 和运行 p10k configure"
        script: "../templates/zsh/final-notes.sh"
        post: true

  - id: "ssh"
    label: "SSH 一键配置"
    description: "安装 SSH 服务、生成密钥、服务器加固、授权密钥管理、fail2ban 防护"
    mode: "multi"
    children:
      # ── 安装 SSH 服务 ──
      - id: "ssh-install"
        label: "安装 SSH 服务"
        mode: "single"
        description: "安装并启动 OpenSSH 服务，或确认系统已有 SSH"
        children:
          - id: "ssh-install-apt"
            label: "安装并启动 SSH 服务 (apt)"
            description: "通过 apt 安装 openssh-server 并启用服务"
            script: "../templates/ssh/install-apt.sh"
          - id: "ssh-install-skip"
            label: "跳过安装，系统已有 SSH"
            description: "检查 sshd 和 SSH 服务是否可用"
            script: "../templates/ssh/install-skip.sh"

      # ── 查看本机公钥 ──
      - id: "ssh-show-pubkey"
        label: "查看本机公钥"
        description: "扫描并显示 ~/.ssh 下所有公钥，方便复制粘贴"
        script: "../templates/ssh/show-pubkey.sh"

      # ── 诊断 SSH 配置 ──
      - id: "ssh-diagnose"
        label: "诊断 SSH 配置"
        description: "检查 sshd 配置语法、权限、端口和服务状态"
        script: "../templates/ssh/diagnose.sh"

      # ── Host Key 管理 ──
      - id: "ssh-hostkey"
        label: "Host Key 管理"
        mode: "single"
        description: "重新生成或保留 SSH Host Key"
        children:
          - id: "ssh-hostkey-regen"
            label: "重新生成所有 Host Key（推荐新机器）"
            description: "备份旧密钥，生成 ed25519 + RSA-4096 新密钥"
            script: "../templates/ssh/hostkey-regen.sh"
          - id: "ssh-hostkey-keep"
            label: "保留现有 Host Key"
            description: "不做修改，保留当前 Host Key"
            script: "../templates/ssh/hostkey-keep.sh"

      # ── SSH 密钥生成 ──
      - id: "ssh-keygen"
        label: "生成 SSH 密钥"
        mode: "single"
        description: "生成客户端 SSH 密钥对"
        children:
          - id: "ssh-keygen-ed25519"
            label: "Ed25519（推荐）"
            description: "安全性好、性能高，现代系统首选"
            script: "../templates/ssh/keygen-ed25519.sh"
          - id: "ssh-keygen-rsa"
            label: "RSA 4096（兼容性最好）"
            description: "兼容旧系统和设备"
            script: "../templates/ssh/keygen-rsa.sh"
          - id: "ssh-keygen-skip"
            label: "跳过，已有密钥"
            description: "检查现有密钥状态"
            script: "../templates/ssh/keygen-skip.sh"

      # ── 服务器加固 ──
      - id: "ssh-hardening"
        label: "服务器加固"
        mode: "multi"
        description: "选择要应用的 sshd 加固项；每项独立执行，修改前均会备份并验证配置"
        children:
          - id: "ssh-disable-password"
            label: "禁止密码登录"
            description: "关闭密码和键盘交互认证，只允许密钥登录；运行前会检查是否存在可用密钥"
            script: "../templates/ssh/disable-password.sh"
          - id: "ssh-disable-root"
            label: "禁止 root 密码登录"
            description: "设置 PermitRootLogin prohibit-password（允许密钥登录 root，完全禁止请手动改为 no）"
            script: "../templates/ssh/disable-root.sh"
          - id: "ssh-custom-port"
            label: "自定义 SSH 端口"
            description: "修改 sshd 监听端口，减少自动化扫描；改端口后请同步更新防火墙和云安全组"
            script: "../templates/ssh/custom-port.sh"
            vars:
              ssh_port: "2222"
            prompt:
              type: "number"
              var: "ssh_port"
              label: "输入自定义 SSH 端口"
          - id: "ssh-limit-users"
            label: "限制登录用户"
            description: "设置 AllowUsers 白名单，仅允许指定用户 SSH 登录"
            script: "../templates/ssh/limit-users.sh"
            vars:
              allowed_users: ""
            prompt:
              type: "text"
              var: "allowed_users"
              label: "输入允许登录的用户名（空格分隔）"
          - id: "ssh-crypto-hardening"
            label: "现代密码套件"
            description: "采用 Mozilla Modern 推荐的 KexAlgorithms、Ciphers 和 MACs，并过滤弱 DH moduli"
            script: "../templates/ssh/crypto-hardening.sh"
          - id: "ssh-session-hardening"
            label: "会话安全加固"
            description: "限制最大认证尝试、登录超时、空闲断连、最大会话数并关闭 X11/TCP 转发"
            script: "../templates/ssh/session-hardening.sh"

      # ── 授权密钥管理 ──
      - id: "ssh-authkeys"
        label: "授权密钥管理"
        mode: "single"
        description: "将公钥导入 authorized_keys，支持本地文件或 GitHub 用户名"
        children:
          - id: "ssh-authkeys-file"
            label: "从本地文件导入公钥"
            description: "读取本地公钥文件并追加到 ~/.ssh/authorized_keys"
            script: "../templates/ssh/authkeys-file.sh"
            vars:
              pubkey_path: ""
            prompt:
              type: "text"
              var: "pubkey_path"
              label: "输入公钥文件路径"
          - id: "ssh-authkeys-github"
            label: "从 GitHub 用户名拉取公钥"
            description: "从 GitHub 用户的 .keys 下载所有公钥并导入"
            script: "../templates/ssh/authkeys-github.sh"
            vars:
              github_user: ""
            prompt:
              type: "text"
              var: "github_user"
              label: "输入 GitHub 用户名"
          - id: "ssh-authkeys-skip"
            label: "跳过，稍后手动配置"
            description: "不导入公钥，稍后可手动编辑 ~/.ssh/authorized_keys"
            script: "../templates/ssh/authkeys-skip.sh"

      # ── 客户端配置 ──
      - id: "ssh-client"
        label: "客户端配置"
        mode: "multi"
        description: "生成推荐 SSH 客户端配置和 SSH Agent 自动启动"
        children:
          - id: "ssh-client-config"
            label: "生成推荐 ~/.ssh/config"
            description: "写入 KeepAlive、HashKnownHosts、AddKeysToAgent 等全局配置"
            script: "../templates/ssh/client-config.sh"
          - id: "ssh-agent-config"
            label: "配置 SSH Agent 自动启动"
            description: "在 shell rc 文件中添加 ssh-agent 自动启动逻辑"
            script: "../templates/ssh/agent-config.sh"

      # ── fail2ban 防暴力破解 ──
      - id: "ssh-fail2ban"
        label: "fail2ban 防暴力破解"
        mode: "single"
        description: "安装并配置 fail2ban 保护 SSH，或跳过"
        children:
          - id: "ssh-fail2ban-install"
            label: "安装并配置 fail2ban"
            description: "安装 fail2ban，为 SSH 启用暴力破解防护（5 次失败封禁 1 小时）"
            script: "../templates/ssh/fail2ban-install.sh"
          - id: "ssh-fail2ban-skip"
            label: "跳过 fail2ban"
            description: "不安装 fail2ban"
            script: "../templates/ssh/fail2ban-skip.sh"

      # ── 防火墙配置 ──
      - id: "ssh-firewall"
        label: "防火墙配置"
        mode: "single"
        description: "启用 UFW 并放行 SSH 端口，或跳过"
        children:
          - id: "ssh-ufw-enable"
            label: "启用 UFW 并放行 SSH"
            description: "安装 UFW，为当前 SSH 端口添加 limit 规则并启用防火墙"
            script: "../templates/ssh/ufw-ssh.sh"
          - id: "ssh-ufw-skip"
            label: "跳过防火墙配置"
            description: "不配置 UFW 防火墙"
            script: "../templates/ssh/ufw-skip.sh"

      # ── 收尾提示 ──
      - id: "ssh-final-notes"
        label: "显示最终提示"
        description: "显示配置摘要与后续操作提示"
        script: "../templates/ssh/final-notes.sh"
        post: true
